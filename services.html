<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeTay - Our Services</title>

  <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Mulish&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@40,600,0,0" />

  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="stylesheet" href="services-style.css">
</head>

<body style="background-color: #000000;">

  <header class="header">
    <div class="container">
      <a href="index.html" class="logo" id="header-logo">
        <img src="./assets/images/logo.png" width="128" height="63" alt="SafeTay Logo">
      </a>

      <nav class="navbar" data-navbar>
        <ul class="navbar-list">
          <li><a href="index.html#home" class="navbar-link">Home</a></li>
          <li><a href="#services" class="navbar-link">Services</a></li>
          <li><a href="index.html#about" class="navbar-link">About</a></li>
          <li><a href="index.html#packages" class="navbar-link">Packages</a></li>
          <li><a href="index.html#contact" class="navbar-link">Contact Us</a></li>
        </ul>
      </nav>

      <a href="index.html" class="btn-link" id="header-back-btn">
        <span class="material-symbols-rounded">arrow_back</span>
        <span class="span">Back</span>
      </a>
    </div>
  </header>

  <main>
    <article>
      <section class="section service-hero" id="services">
        <div class="container services-header-bubble">
          <p class="section-subtitle :dark">SafeTay - Comprehensive Auto Care</p>
          <h2 class="h1 section-title">Our Services</h2>
          <p class="section-text">Text inside bubble layout from wireframe.</p>
        </div>
      </section>

      <section class="section search-cards-bubble-section">
        <div class="container main-bubble">
          
          <div class="search-container">
            <input type="search" id="service-search" placeholder="Search for cards (e.g., Brake)..." class="search-input">
          </div>

          <ul class="services-grid" id="services-grid">
            <li class="card-item" data-service="Respray">
              <div class="card-inner">
                <div class="card-front">
                  <div class="card-icon">
                    <img src="./assets/images/services-1.png" width="50" height="50" alt="">
                  </div>
                  <h3 class="h3 card-title">Respray</h3>
                </div>
                <div class="card-back">
                  <button class="btn btn-primary get-quote-btn"><span class="span">Get a Quote</span></button>
                </div>
              </div>
            </li>

            <li class="card-item" data-service="Tyre Replacement">
              <div class="card-inner">
                <div class="card-front">
                  <div class="card-icon">
                    <img src="./assets/images/services-3.png" width="50" height="50" alt="">
                  </div>
                  <h3 class="h3 card-title">Tyre Replacement</h3>
                </div>
                <div class="card-back">
                  <button class="btn btn-primary get-quote-btn"><span class="span">Get a Quote</span></button>
                </div>
              </div>
            </li>

            <li class="card-item" data-service="Brake Repair">
              <div class="card-inner">
                <div class="card-front">
                  <div class="card-icon">
                    <img src="./assets/images/services-2.png" width="50" height="50" alt="">
                  </div>
                  <h3 class="h3 card-title">Brake Repair</h3>
                </div>
                <div class="card-back">
                  <button class="btn btn-primary get-quote-btn"><span class="span">Get a Quote</span></button>
                </div>
              </div>
            </li>

            <li class="card-item" data-service="Engine Repair">
              <div class="card-inner">
                <div class="card-front">
                  <div class="card-icon">
                    <img src="./assets/images/services-1.png" width="50" height="50" alt="">
                  </div>
                  <h3 class="h3 card-title">Engine Repair</h3>
                </div>
                <div class="card-back">
                  <button class="btn btn-primary get-quote-btn"><span class="span">Get a Quote</span></button>
                </div>
              </div>
            </li>

            <li class="card-item" data-service="Battery Check">
              <div class="card-inner">
                <div class="card-front">
                  <div class="card-icon">
                    <img src="./assets/images/services-4.png" width="50" height="50" alt="">
                  </div>
                  <h3 class="h3 card-title">Battery Check</h3>
                </div>
                <div class="card-back">
                  <button class="btn btn-primary get-quote-btn"><span class="span">Get a Quote</span></button>
                </div>
              </div>
            </li>

            <li class="card-item" data-service="Steering Alignment">
              <div class="card-inner">
                <div class="card-front">
                  <div class="card-icon">
                    <img src="./assets/images/services-6.png" width="50" height="50" alt="">
                  </div>
                  <h3 class="h3 card-title">Steering Alignment</h3>
                </div>
                <div class="card-back">
                  <button class="btn btn-primary get-quote-btn"><span class="span">Get a Quote</span></button>
                </div>
              </div>
            </li>
          </ul>

        </div>
      </section>

      <section class="section quote-section hidden" id="quote-form-section">
        <div class="container quote-bubble">
          <h2 class="h2 section-title">Request a Quote</h2>
          <form id="quote-form" class="form-grid">
            <input type="text" name="name" placeholder="Full Name" class="input-field" required>
            <input type="email" name="email" placeholder="Email Address" class="input-field" required>
            <input type="text" id="selected-service-field" name="service" placeholder="Selected Service" class="input-field" readonly>
            <div class="add-more-container">
                <button type="button" id="add-more-btn" class="add-more-btn">Add More Services +</button>
                <div id="extra-services-list" class="hidden">
                    </div>
            </div>
            <textarea name="message" placeholder="Message" class="input-field textarea"></textarea>
            <button type="submit" class="btn btn-primary">Submit Request</button>
          </form>
        </div>
      </section>

    </article>
  </main>

  <script src="services-script.js"></script>
</body>
</html>
